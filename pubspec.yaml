name: tenggatify
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  sqflite: ^2.3.0
  path: ^1.9.1
  # Versi 2.3.3 adalah versi terakhir yang stabil untuk Dart 3.11
  sqflite_common_ffi: 2.3.3
  sqlite3_flutter_libs: 0.5.18
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^5.1.0
  file_picker: ^8.1.4
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1

dependency_overrides:
  # sqlite3 2.3.0 menambahkan 'autocommit' ke CommonDatabase (Fix Windows build)
  # dan tetap kompatibel dengan Dart 3.11.4
  sqlite3: 2.3.0
  sqflite_common_ffi: 2.3.3
  sqlite3_flutter_libs: 0.5.18

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - android/app/src/main/res/raw/
